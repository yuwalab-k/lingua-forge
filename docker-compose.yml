services:
  frontend:
    build: ./frontend
    platform: linux/arm64
    ports:
      - "5174:5174"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/vite.config.js:/app/vite.config.js
    command: npm run dev -- --host

  backend:
    build: ./backend
    ports:
      - "3001:3001"
    volumes:
      - ./backend:/app
    environment:
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_MODEL=mitmul/plamo-2-translate
    depends_on:
      - ollama
    command: cargo run

  transcription:
    build: ./transcription
    ports:
      - "3003:3003"
    volumes:
      - whisper_cache:/root/.cache/huggingface
    environment:
      - WHISPER_MODEL=medium

  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  ollama_data:
  whisper_cache:
